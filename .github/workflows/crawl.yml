name: 채용 공고 자동 수집

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "강제 재수집 여부"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    name: 크롤링 및 배포
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 채용 공고 수집
        env:
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
        run: python crawler/crawl.py

      - name: 결과 요약
        run: |
          if [ -f docs/jobs.json ]; then
            python3 -c "
          import json
          with open('docs/jobs.json') as f:
              d = json.load(f)
          jobs = d.get('jobs', [])
          print(f'총 공고: {len(jobs)}건')
          "
          else
            echo "jobs.json 없음 — API 키 없이는 목 데이터만 사용"
          fi

      - name: jobs.json 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 채용 공고 자동 업데이트"
            git push
          fi

      - name: Pages 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: GitHub Pages 배포
        uses: actions/deploy-pages@v4
